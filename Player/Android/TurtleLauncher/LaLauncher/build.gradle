apply plugin: 'com.android.application'

def defaultKeystoreFile = rootProject.file("../../_shared/platformkeys/krizer/platform.jks")
def keystorePath = System.getenv("ANDROID_KEYSTORE_PATH") ?: defaultKeystoreFile.path
def keystorePassword = System.getenv("ANDROID_KEYSTORE_PASSWORD") ?: "android"
def keyAliasValue = System.getenv("ANDROID_KEY_ALIAS") ?: "androiddebugkey"
def keyPasswordValue = System.getenv("ANDROID_KEY_PASSWORD") ?: "android"

android {
    compileSdkVersion 22
    signingConfigs {
        debug {
            storeFile file(keystorePath)
            storePassword keystorePassword
            keyAlias keyAliasValue
            keyPassword keyPasswordValue
        }
        release {
            storeFile file(keystorePath)
            storePassword keystorePassword
            keyAlias keyAliasValue
            keyPassword keyPasswordValue
        }
    }
    defaultConfig {
        applicationId 'com.github.postapczuk.lalauncher'
        minSdkVersion 17
        targetSdkVersion 17
        versionCode 14
        versionName '1.8.0'
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    lintOptions {
        disable 'MissingTranslation'
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'net.sourceforge.streamsupport:streamsupport:1.6.0'
}
